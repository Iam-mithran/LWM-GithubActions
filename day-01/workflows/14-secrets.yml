# 14 - Secrets
# NEVER hard-code passwords, tokens, or API keys in a workflow file.
# Store them in:  repo Settings -> Secrets and variables -> Actions -> New repository secret
# Then read them with the `secrets` context: ${{ secrets.NAME }}
#
# For this demo, first create a secret named MY_API_KEY with any value.
#
# SECURITY NOTES:
#   * GitHub automatically MASKS secret values in logs (they show as ***).
#   * Never `echo` a secret directly — pass it via env and use it in a command.
#   * secrets are NOT passed to workflows triggered by forked-repo pull requests.

name: 14 - Secrets

on: workflow_dispatch

jobs:
  use-secret:
    runs-on: ubuntu-latest
    steps:
      - name: Confirm the secret is present (without printing it)
        env:
          API_KEY: ${{ secrets.MY_API_KEY }}
        run: |
          if [ -z "$API_KEY" ]; then
            echo "❌ Secret MY_API_KEY is not set. Add it in repo settings."
            exit 1
          fi
          echo "✅ Secret is available. Length is ${#API_KEY} characters."
          echo "Even if I try to print it, GitHub masks it: $API_KEY"

      - name: Realistic usage — pass a secret to a command
        env:
          API_KEY: ${{ secrets.MY_API_KEY }}
        run: |
          # e.g. curl -H "Authorization: Bearer $API_KEY" https://api.example.com
          echo "Would call an API using the secret from the environment."
