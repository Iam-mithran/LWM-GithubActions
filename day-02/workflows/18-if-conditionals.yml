# 18 - `if`: running a job or a step only when it matters
# `if:` can sit on a JOB or on a STEP. If the expression is false, that job
# or step is SKIPPED (grey), and skipping is not failing.
#
# THE #1 GOTCHA — `if:` is already an expression context.
#   if: github.ref == 'refs/heads/main'        <- correct, no ${{ }} needed
#   if: ${{ github.ref == 'refs/heads/main' }} <- also works
#   if: ${{ false }}                           <- false, as expected
#   if: 'false'                                <- TRUE! It is a non-empty
#                                                 STRING, and every non-empty
#                                                 string is truthy.
# Rule of thumb: write conditions WITHOUT ${{ }} and never quote booleans.
#
# WHAT TO OBSERVE: run it once from the "Run workflow" button, then push a
# commit to main, and compare which jobs are grey in each run.

name: 18 - If Conditionals

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  # ── Job-level if ─────────────────────────────────────────────────────────
  always-runs:
    runs-on: ubuntu-latest
    steps:
      - run: echo "No condition — I run for every trigger."

  only-on-main-push:
    # Two conditions joined with && . Also available: || and !
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - run: echo "A real deploy job would be gated exactly like this."

  only-on-pull-requests:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - run: echo "PR-only checks (e.g. commenting on the diff) go here."

  # ── Step-level if ────────────────────────────────────────────────────────
  step-conditions:
    runs-on: ubuntu-latest
    env:
      DEPLOY_TARGET: staging
    steps:
      - name: Compare against an env variable
        if: env.DEPLOY_TARGET == 'staging'
        run: echo "Deploying to staging."

      - name: This one is skipped
        if: env.DEPLOY_TARGET == 'production'
        run: echo "You will never see this line."

      # Useful string helpers: contains(), startsWith(), endsWith()
      - name: String helper functions
        if: startsWith(github.ref, 'refs/heads/') && !contains(github.ref_name, 'wip')
        run: echo "Running on a branch that is not marked wip."

      # `steps.<id>.outcome` lets a later step react to an earlier one.
      # Requires the earlier step to have an `id`.
      - name: A step that might fail
        id: risky
        continue-on-error: true        # do not kill the job (see file 33)
        run: exit 1

      - name: React to the failure
        if: steps.risky.outcome == 'failure'
        run: echo "The risky step failed, but we caught it and carried on."
